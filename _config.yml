title: claude-helm
description: A Claude Code plugin pack for solo developers.
url: "https://myowinthein.github.io"
baseurl: "/claude-helm"
image: /claude-helm/docs/images/banner.jpg

remote_theme: just-the-docs/just-the-docs@v0.12.0
nav_sort: order
nav_external_links:
  - title: GitHub
    url: https://github.com/myowinthein/claude-helm
    hide_icon: false

footer_content: "claude-helm &mdash; MIT License"

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

# Every new top-level directory must be added here manually or Jekyll will include it in the site build.
exclude:
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - LICENSE
  - .gitignore
  - .DS_Store
  - .claude/
  - .claude-plugin/
  - commands/
  - rules/
  - steps/
  - docs/legal/
